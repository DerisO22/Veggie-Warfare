version: '3.8'

services:
  frontend:
    image: node:lts-alpine
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  backend:
    image: node:lts-alpine
    working_dir: /server
    volumes:
      - ./server:/server
      - /server/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV:development
      - DATABASE_URL=postgres://example-database-user:HmxWFa4EgEYJnjs7ABdLRELS4fpv86vL@example-database:5432/example-database
    depends_on:
      - example-database
    command: sh -c "npm install && node server.js"

  example-database:
    container_name: example-database
    environment:
      - POSTGRES_USER=example-database-user
      - POSTGRES_PASSWORD=HmxWFa4EgEYJnjs7ABdLRELS4fpv86vL
      - POSTGRES_DB=example-database
    image: postgres:13-alpine
    ports:
      - "5433:5432"
    volumes:
      - example-database-data:/var/lib/postgresql/data

  example-database-viewer:
    container_name: example-database-viewer
    image: dpage/pgadmin4
    ports:
      - "54320:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=user@example.com
      - PGADMIN_DEFAULT_PASSWORD=g3KyPSr26tgKmyWbGb4MrSmGm5c5rg8T

volumes:
  example-database-data:
    name: example-database-data